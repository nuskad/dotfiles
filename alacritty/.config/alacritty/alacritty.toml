
[colors]
#background = "#282738"

[cursor]
unfocused_hollow = false

[cursor.style]
blinking = "On"
shape = "Block"

[env]
TERM = "xterm-256color"
WINIT_X11_SCALE_FACTOR = "1.0"

[window]
decorations = "full"
dynamic_title = true
opacity = 1
startup_mode = "Windowed"

[window.dimensions]
columns = 164
lines = 48

[window.padding]
x = 10
y = 10

[general]
live_config_reload = true
import = ["/home/nuskad/.config/alacritty/colors.toml", "/home/nuskad/.config/alacritty/fonts.toml"]
